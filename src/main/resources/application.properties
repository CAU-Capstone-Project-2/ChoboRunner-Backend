spring.application.name=server
server.port=8080
openapi.server-local-url=http://localhost:8080
openapi.server-https-url=https://capstone2-backend.foopky.com

spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/choborunner?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
app.websocket.max-message-size-bytes=10485760

cloud.aws.s3.bucket=capstone2-backend
cloud.aws.region.static=ap-northeast-2
cloud.aws.s3.stack.auto=false

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true