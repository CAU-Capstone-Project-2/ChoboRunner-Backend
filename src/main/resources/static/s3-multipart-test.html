<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S3 Multipart Upload Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; max-width: 900px; }
        h1 { margin-bottom: 8px; }
        .row { margin: 12px 0; }
        button { padding: 8px 12px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 12px; border-radius: 8px; overflow: auto; }
        .hint { color: #666; font-size: 14px; }
    </style>
</head>
<body>
<h1>S3 업로드/링크 조회 테스트</h1>
<p class="hint">같은 서버에서 열어야 CORS 이슈 없이 테스트됩니다. 예: http://localhost:8080/s3-multipart-test.html</p>

<div class="row">
    <input id="fileInput" type="file" />
    <button id="uploadBtn" type="button">업로드</button>
</div>

<div class="row">
    <button id="listBtn" type="button">링크 목록 불러오기</button>
</div>

<h3>응답</h3>
<pre id="output">대기 중...</pre>

<script>
    const output = document.getElementById('output');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const listBtn = document.getElementById('listBtn');

    function print(data) {
        output.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    uploadBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) {
            print('파일을 먼저 선택하세요.');
            return;
        }

        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch('/api/s3/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            print({ status: response.status, data });
        } catch (error) {
            print('업로드 요청 실패: ' + error.message);
        }
    });

    listBtn.addEventListener('click', async () => {
        try {
            const response = await fetch('/api/s3/links');
            const data = await response.json();
            print({ status: response.status, count: Array.isArray(data) ? data.length : null, data });
        } catch (error) {
            print('링크 목록 요청 실패: ' + error.message);
        }
    });
</script>
</body>
</html>
